<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 512px;
        height: 512px;
      }

      .avatar {
        position: relative;
        width: 512px;
        height: 512px;
        overflow: hidden;
        background: radial-gradient(
          circle at 50% 46%,
          #ffb066 0%,
          #f57a1c 58%,
          #de5c08 100%
        );
      }

      .ring {
        position: absolute;
        border-radius: 50%;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .r1 {
        width: 200px;
        height: 200px;
        border: 2px solid rgba(255, 255, 255, 0.42);
      }

      .r2 {
        width: 320px;
        height: 320px;
        border: 2px solid rgba(255, 255, 255, 0.22);
      }

      .r3 {
        width: 440px;
        height: 440px;
        border: 2px solid rgba(255, 255, 255, 0.1);
      }

      .glow {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 360px;
        height: 360px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.9) 0%,
          rgba(255, 255, 255, 0.4) 32%,
          rgba(255, 255, 255, 0.12) 58%,
          rgba(255, 255, 255, 0) 78%
        );
      }

      .dot {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 76px;
        height: 76px;
        background: #ffffff;
        border-radius: 50%;
        box-shadow: 0 0 22px 8px rgba(255, 255, 255, 0.85);
      }
    </style>
  </head>
  <body>
    <div class="avatar">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="glow"></div>
      <div class="dot"></div>
    </div>
  </body>
</html>
