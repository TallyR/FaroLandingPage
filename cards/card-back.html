<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      @page {
        size: 3.66in 2.16in;
        margin: 0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 3.66in;
        height: 2.16in;
      }

      .card {
        position: relative;
        width: 3.66in;
        height: 2.16in;
        overflow: hidden;
        background: radial-gradient(circle at 18% 0%, #ff8b33 0%, #ee7418 60%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        color: #fff;
      }


      .pain {
        font-family: "Instrument Serif", Georgia, serif;
        font-size: 15px;
        margin-bottom: 12px;
      }

      .pain em {
        font-style: italic;
      }

      .bubble {
        background: #fff;
        color: #e86a10;
        font-size: 13px;
        font-weight: 600;
        padding: 7px 15px;
        border-radius: 999px;
        border-bottom-right-radius: 4px;
        box-shadow: 0 3px 10px rgba(180, 74, 5, 0.25);
      }

      .num {
        font-family: "Instrument Serif", Georgia, serif;
        font-size: 27px;
        margin-top: 11px;
        letter-spacing: 0.01em;
      }

      .line {
        font-size: 10px;
        margin-top: 7px;
        color: rgba(255, 255, 255, 0.88);
      }

      .support {
        position: absolute;
        bottom: 0.26in;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 6.5px;
        font-weight: 200;
        letter-spacing: 0.04em;
        color: #ffffff;
      }

    </style>
  </head>
  <body>
    <div class="card">
      <p class="pain">your brain drops things. <em>faro doesn't.</em></p>
      <span class="bubble">hey faro</span>
      <p class="num">+1 (646) 879-0459</p>
      <p class="line">text it. that's the whole onboarding.</p>
      <p class="support">issues or feature requests? text me: +1 (646) 739-3041 · hello@faro.com</p>
    </div>
  </body>
</html>
