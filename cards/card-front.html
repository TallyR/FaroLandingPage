<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      @page {
        size: 3.66in 2.16in;
        margin: 0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 3.66in;
        height: 2.16in;
      }

      .card {
        position: relative;
        width: 3.66in;
        height: 2.16in;
        overflow: hidden;
        background: radial-gradient(
          circle at 50% 42%,
          #ff9d4d 0%,
          #f57f24 55%,
          #e86a10 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Instrument Serif", Georgia, serif;
        color: #fff;
      }

      .ring {
        position: absolute;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        left: 50%;
        top: 42%;
        transform: translate(-50%, -50%);
      }

      .r1 {
        width: 1.15in;
        height: 1.15in;
      }

      .r2 {
        width: 1.75in;
        height: 1.75in;
        border-color: rgba(255, 255, 255, 0.12);
      }

      .r3 {
        width: 2.45in;
        height: 2.45in;
        border-color: rgba(255, 255, 255, 0.07);
      }

      .dot {
        width: 9px;
        height: 9px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 0 16px 5px rgba(255, 255, 255, 0.6);
        margin-bottom: 12px;
      }

      h1 {
        font-size: 42px;
        font-weight: 400;
        line-height: 1;
      }

      p {
        font-style: italic;
        font-size: 13px;
        margin-top: 7px;
        opacity: 0.92;
      }

      .site {
        position: absolute;
        bottom: 0.3in;
        left: 0;
        right: 0;
        text-align: center;
        font-style: normal;
        font-size: 10.5px;
        letter-spacing: 0.04em;
        opacity: 0.8;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <span class="dot"></span>
      <h1>faro</h1>
      <p>forget things? faro keeps you accountable.</p>
      <p class="site">justtextfaro.com</p>
    </div>
  </body>
</html>
